<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Colaborador</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3ee;
            padding: 25px;
            margin: 0;
        }

        .contenedor {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        h1, h2 {
            text-align: center;
        }

        .bloque {
            background: #fafafa;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #ddd;
            margin-bottom: 25px;
        }

        form {
            display: grid;
            gap: 10px;
        }

        select,
        input,
        button {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #157347;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .volver {
            text-align: center;
            margin-bottom: 20px;
        }

        .volver a {
            color: #157347;
            font-weight: bold;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <h1>{{ titulo }}</h1>
    <h2>Panel Colaborador</h2>

    <div class="volver">
        <a href="/">Ver tabla pública</a>
        <a href="/logout">Cerrar sesión</a>
    </div>

    <div class="bloque">
        <h2>Cargar Resultado de Jugador</h2>

        <form method="POST" action="/admin">
            <select name="jugador" required>
                <option value="">Seleccionar jugador</option>

                {% for jugador in jugadores %}
                    <option value="{{ jugador.id }}">
                        {{ jugador.nombre }} - HCP {{ jugador.handicap }}
                    </option>
                {% endfor %}
            </select>

            <input type="number" name="ida" placeholder="Ida" required>
            <input type="number" name="vuelta" placeholder="Vuelta" required>

            <button type="submit">Guardar resultado</button>
        </form>
    </div>

    <div class="bloque">
        <h2>Cargar Resultado de Match</h2>

        <form method="POST" action="/cargar_resultado_match_equipo">
            <select name="match_id" required>
                <option value="">Seleccionar match pendiente</option>

                {% for m in matches_equipos.pendientes %}
                    <option value="{{ m.id }}">
                        Match {{ m.numero_match }} -
                        {{ m.jugador_team22 }}{% if m.comodin_team22 == 1 %} ⭐{% endif %}
                        vs
                        {{ m.jugador_aguilas }}{% if m.comodin_aguilas == 1 %} ⭐{% endif %}
                    </option>
                {% endfor %}
            </select>

            <input type="number" step="0.5" name="puntos_partido_team22" placeholder="Resultado Team 22" required>
            <input type="number" step="0.5" name="puntos_partido_aguilas" placeholder="Resultado Águilas" required>

            <button type="submit">Guardar match</button>
        </form>
    </div>

</div>

</body>
</html>
